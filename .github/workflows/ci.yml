name: ci

on:
  pull_request:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  AWS_DEFAULT_REGION: us-east-1

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

      - name: Validate SAM template
        run: sam validate --template-file infra/template.yaml --region "$AWS_REGION"

      - name: Build SAM application
        run: sam build --template-file infra/template.yaml --region "$AWS_REGION"

      - name: Build edge image
        run: docker build -f edge/Dockerfile -t fog-edge:ci .

      - name: Build fog image
        run: docker build -f fog/Dockerfile -t fog-node:ci .

      - name: Build dashboard image
        run: docker build -f cloud/dashboard/Dockerfile -t fog-dashboard:ci .
