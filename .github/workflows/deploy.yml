name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  STACK_NAME: fog-car-insurance-pricing
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: fog-car-insurance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template
        run: sam validate --template-file infra/template.yaml

      - name: Initial SAM deploy
        run: |
          sam build --template-file infra/template.yaml
          sam deploy \
            --template-file .aws-sam/build/template.yaml \
            --stack-name "$STACK_NAME" \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides ProjectName="$PROJECT_NAME"

      - name: Ensure dashboard Function URL
        run: |
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DashboardFunctionName'].OutputValue | [0]" \
            --output text)

          if aws lambda get-function-url-config \
            --function-name "$FUNCTION_NAME" \
            >/dev/null 2>&1; then
            aws lambda update-function-url-config \
              --function-name "$FUNCTION_NAME" \
              --auth-type NONE \
              --cors '{"AllowOrigins":["*"],"AllowMethods":["GET","POST"],"AllowHeaders":["*"]}'
          else
            aws lambda create-function-url-config \
              --function-name "$FUNCTION_NAME" \
              --auth-type NONE \
              --cors '{"AllowOrigins":["*"],"AllowMethods":["GET","POST"],"AllowHeaders":["*"]}'
          fi

          POLICY_JSON=$(aws lambda get-policy --function-name "$FUNCTION_NAME" --query 'Policy' --output text 2>/dev/null || true)
          if ! printf '%s' "$POLICY_JSON" | grep -q '"Sid":"dashboard-url-public"'; then
            aws lambda add-permission \
              --function-name "$FUNCTION_NAME" \
              --statement-id dashboard-url-public \
              --action lambda:InvokeFunctionUrl \
              --principal '*' \
              --function-url-auth-type NONE
          fi

          if ! printf '%s' "$POLICY_JSON" | grep -q '"Sid":"dashboard-url-public-invoke"'; then
            aws lambda add-permission \
              --function-name "$FUNCTION_NAME" \
              --statement-id dashboard-url-public-invoke \
              --action lambda:InvokeFunction \
              --principal '*' \
              --invoked-via-function-url
          fi

          DASHBOARD_URL=$(aws lambda get-function-url-config \
            --function-name "$FUNCTION_NAME" \
            --query 'FunctionUrl' \
            --output text)
          echo "Dashboard URL: $DASHBOARD_URL"
